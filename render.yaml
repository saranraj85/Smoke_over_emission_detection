services:
  - type: web
    name: smoke-emission-monitor
    runtime: node
    buildCommand: npm install --prefix backend
    startCommand: npm --prefix backend start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ALERT_RECIPIENT
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: TWILIO_TO_NUMBER
        sync: false
      - key: ALERT_COOLDOWN_MINUTES
        value: 5
      - key: API_SECRET_KEY
        value: smoke_emission_secret_key_2026
      - key: DASHBOARD_URL
        sync: false
